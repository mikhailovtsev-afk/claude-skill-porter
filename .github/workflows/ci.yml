name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile converter
        run: python -m py_compile skills/claude-skill-porter/scripts/convert_claude_skill.py

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'
